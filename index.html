<!doctype html><html lang="zh-TW"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>AT Case Library</title><link rel="stylesheet" href="v13-style.css?v=27"><style>[hidden]{display:none!important}</style></head><body>
<section id="auth" class="auth"><form id="authForm"><div class="brand">AT</div><h1>AT Case Library</h1><p>運動傷害個案紀錄</p><label>登入帳號<input name="email" type="email" required autocomplete="username"></label><label>密碼<input id="loginPassword" name="password" type="password" minlength="8" required autocomplete="current-password"></label><button type="button" id="showPassword">顯示密碼</button><button class="primary">登入</button><small id="authMsg"></small></form></section>
<div id="app" hidden><header><div class="headerLeft"><button class="mobileMenu" id="mobileMenu" aria-expanded="false" aria-controls="sidebar" aria-label="開啟主選單">☰</button><button type="button" id="homeBrand" class="homeBrand" aria-label="返回首頁"><span aria-hidden="true">🏠</span><b>AT CASE LIBRARY</b></button><h1 id="pageTitle" class="srOnly">首頁</h1></div><nav class="accountNav"><span id="profileName"></span><button type="button" id="headerSettings" class="headerIcon" aria-label="系統設定" title="系統設定">⚙</button><button id="logout">登出</button></nav></header>
<main><aside id="sidebar" aria-label="主導覽"><button type="button" id="sidebarClose" class="sidebarClose" aria-label="關閉主選單">× 關閉</button><div class="sideTitle">工作入口</div><button class="sideItem" data-nav="home"><span>⌂ 首頁</span></button><button class="sideItem" data-nav="search"><span>⌕ 搜尋個案</span></button><button class="sideItem" data-nav="new-patient"><span>＋ 新增個案</span></button><button class="sideItem" data-nav="library"><span>▦ 個案庫</span><b id="allCount"></b></button><button class="sideItem" data-nav="recent"><span>◷ 最近使用</span></button><button class="sideItem" data-nav="settings"><span>⚙ 系統設定</span></button></aside>
<div id="sidebarOverlay" class="sidebarOverlay" hidden aria-hidden="true"></div><section class="content"><div class="toolbar"><label class="search">⌕ <input id="globalSearch" placeholder="搜尋姓名、分類、日期或紀錄關鍵字"></label><select id="sort"><option value="updated">最近更新</option><option value="name">姓名</option><option value="created">建立日期</option><option value="count">紀錄數量</option></select><button class="primary" id="addPatient">＋ 新增個案</button></div><div id="breadcrumbs"></div><div id="workspace"></div></section></main></div>
<div id="legacyActions" hidden><button id="stats"></button><button id="backup"></button><button id="importJson"></button><button id="users"></button><button id="categoryManage"></button><button id="bodyPartManage"></button><button id="treatmentManage"></button><input id="jsonFile" type="file" accept="application/json,.json"></div>
<dialog id="modal"><form id="modalForm"><button type="button" id="modalBack" class="modalBack" hidden>← 返回系統設定</button><div class="modalHeader"><h2 id="modalTitle"></h2><button type="button" id="modalClose" aria-label="關閉視窗">×</button></div><div id="modalFields"></div><div class="actions"><button type="button" id="cancel">取消</button><button class="primary" id="submitButton">儲存</button></div></form></dialog>
<dialog id="homeConfirm" class="homeConfirm"><section><h2>尚未儲存</h2><p>目前有尚未儲存的內容，是否返回首頁？</p><div class="actions"><button type="button" id="continueEditing">繼續編輯</button><button type="button" class="primary" id="discardHome">放棄變更並返回首頁</button></div></section></dialog>
<script src="supabase.js?v=27"></script><script src="v2-app.js?v=27"></script></body></html>
