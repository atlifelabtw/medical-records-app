<!doctype html><html lang="zh-TW"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AT Case Library</title><link rel="stylesheet" href="v4-style.css"><style>[hidden]{display:none!important}</style></head><body>
<section id="auth" class="auth"><form id="authForm"><div class="brand">AT</div><h1>AT Case Library</h1><p>運動傷害個案紀錄</p><label>登入帳號<input name="email" type="email" required autocomplete="username"></label><label>密碼<input id="loginPassword" name="password" type="password" minlength="8" required autocomplete="current-password"></label><button type="button" id="showPassword">顯示密碼</button><button class="primary">登入</button><small id="authMsg"></small></form></section>
<div id="app" hidden><header><button class="mobileMenu" id="mobileMenu">☰</button><div><small>AT CASE LIBRARY</small><h1 id="pageTitle">所有個案</h1></div><nav><button id="stats">統計</button><button id="backup">備份與資料</button><button id="importJson" hidden>匯入 JSON</button><input id="jsonFile" type="file" accept="application/json,.json" hidden><button id="users" hidden>帳號管理</button><button id="logout">登出</button></nav></header>
<main><aside id="sidebar"><div class="sideTitle">資料夾</div><button class="sideItem active" data-view="all">▦ 所有個案 <span id="allCount"></span></button><div id="categoryList"></div><button class="sideItem" id="categoryManage">⚙ 分類管理</button><div class="sideTitle settingsTitle">選項設定</div><button class="sideItem" id="bodyPartManage">⚙ 部位設定</button><button class="sideItem" id="treatmentManage">⚙ 處理方式設定</button></aside>
<section class="content"><div class="toolbar"><label class="search">⌕ <input id="globalSearch" placeholder="搜尋姓名、分類、日期或紀錄關鍵字"></label><select id="sort"><option value="updated">最近更新</option><option value="name">姓名</option><option value="created">建立日期</option><option value="count">紀錄數量</option></select><button class="primary" id="addPatient">＋ 新增個案</button></div><div id="breadcrumbs"></div><div id="workspace"></div></section></main></div>
<dialog id="modal"><form id="modalForm"><h2 id="modalTitle"></h2><div id="modalFields"></div><div class="actions"><button type="button" id="cancel">取消</button><button class="primary" id="submitButton">儲存</button></div></form></dialog>
<script type="module" src="v2-app.js?v=5"></script></body></html>
