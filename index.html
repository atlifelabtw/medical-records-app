<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>病歷紀錄系統</title><link rel="stylesheet" href="style.css"><style>[hidden]{display:none!important}</style></head><body>
<section id="auth" class="auth"><form id="authForm"><h1>病歷紀錄系統</h1><p>獨立帳號安全登入</p><label>電子郵件<input name="email" type="email" required></label><label>密碼<input name="password" type="password" minlength="8" required></label><button>登入</button><button type="button" class="secondary" id="signup">申請子管理者帳號</button><small id="authMsg"></small></form></section>
<div id="app" hidden><header><div><small>安全雲端資料庫</small><h1>病歷紀錄</h1></div><nav><span id="account"></span><button id="stats">統計分析</button><button id="backup">備份</button><button id="users" hidden>帳號管理</button><button id="logout">登出</button></nav></header><main><aside><input id="search" placeholder="搜尋姓名、部位、處理或備註"><button id="addPatient">＋ 新增病人</button><div id="patientList"></div></aside><section id="detail"><div class="welcome">請選擇或新增病人</div></section></main></div>
<dialog id="modal"><form id="modalForm"><h2 id="modalTitle"></h2><div id="modalFields"></div><div class="actions"><button type="button" id="cancel">取消</button><button>儲存</button></div></form></dialog>
<script type="module" src="app.js"></script></body></html>
